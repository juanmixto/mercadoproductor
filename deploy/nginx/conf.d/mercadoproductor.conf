# ─── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name mercadoproductor.com www.mercadoproductor.com
                admin.mercadoproductor.com
                productores.mercadoproductor.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Storefront principal ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name mercadoproductor.com www.mercadoproductor.com;

    ssl_certificate     /etc/nginx/ssl/live/mercadoproductor.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/mercadoproductor.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 10m;

    # API proxy — /api/v1/* va al backend
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Stripe webhooks — sin rate limit estricto
    location /api/v1/webhooks/ {
        proxy_pass         http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Activos estáticos de Next.js — caché agresiva
    location /_next/static/ {
        proxy_pass  http://web_upstream;
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    # Favicon e imágenes estáticas
    location ~* \.(ico|jpg|jpeg|png|gif|svg|webp|woff|woff2)$ {
        proxy_pass  http://web_upstream;
        expires     30d;
        add_header  Cache-Control "public";
    }

    # Resto → Next.js
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        proxy_pass         http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# ─── Panel de Administración ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.mercadoproductor.com;

    ssl_certificate     /etc/nginx/ssl/live/mercadoproductor.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/mercadoproductor.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:5m;
    add_header Strict-Transport-Security "max-age=63072000" always;
    # Restricción de acceso por IP en producción (descomenta y ajusta)
    # allow 203.0.113.0/24;
    # deny all;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

